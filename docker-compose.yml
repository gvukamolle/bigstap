# Имя проекта фиксирует префикс томов (bigstep_bigstep-media, bigstep_bigstep-postgres-data),
# чтобы он совпадал с командами бэкапа в docs независимо от имени каталога клонирования.
name: bigstep

services:
  postgres:
    image: postgres:16
    container_name: bigstep-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bigstep
      POSTGRES_USER: bigstep
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env before starting Postgres}
    # Порт НЕ публикуется наружу: app ходит к БД по внутренней сети compose (host=postgres).
    # Публикация даже на 127.0.0.1 открыла бы 5432 с ПДн любому локальному процессу на VPS.
    volumes:
      - bigstep-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bigstep -d bigstep"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Домен инлайнится в бандл на этапе build; берётся из .env (та же переменная, что в рантайме).
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://bigstep.ru}
    image: bigstep-app
    container_name: bigstep-app
    restart: unless-stopped
    # Все секреты и настройки — из .env (DATABASE_URI должен указывать на хост postgres).
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # Слушает только localhost — наружу отдаёт reverse-proxy (Caddy/nginx) с TLS.
      - "127.0.0.1:3000:3000"
    volumes:
      # Загрузки Payload переживают пересборку образа.
      - bigstep-media:/app/media
    healthcheck:
      # Лёгкий liveness /api/health (без БД). В slim-образе нет curl/wget, но Node 22 имеет fetch.
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bigstep-postgres-data:
  bigstep-media:
