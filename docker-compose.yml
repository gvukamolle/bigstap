services:
  postgres:
    image: postgres:16
    container_name: bigstep-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bigstep
      POSTGRES_USER: bigstep
      POSTGRES_PASSWORD: bigstep
    ports:
      - "5432:5432"
    volumes:
      - bigstep-postgres-data:/var/lib/postgresql/data

volumes:
  bigstep-postgres-data:
